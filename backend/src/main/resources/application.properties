spring.application.name=ec-backend
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/pcparts_ec?useSSL=false&serverTimezone=Asia/Tokyo
spring.datasource.username=${DB_USERNAME:ecapp}
spring.datasource.password=${DB_PASSWORD:local-dev-only}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=${JWT_SECRET:dev-only-secret-key-change-in-production-0123456789abcdef}
app.jwt.expiration-ms=86400000

stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

app.cors.allowed-origin=http://localhost:5173
